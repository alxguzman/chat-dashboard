<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Market Bubble — Live Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

  <div id="ticker-bar">
    <div class="ticker-track" id="ticker-track"></div>
  </div>

  <div id="app">

    <!-- LEFT: Live X Posts -->
    <aside id="tweets-panel">
      <div class="panel-header">
        <div class="panel-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.858L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          Live Posts
        </div>
        <span class="live-badge">LIVE</span>
      </div>
      <div id="tweets-feed"></div>
      <a class="view-more-btn" href="https://x.com" target="_blank">View on X ↗</a>
    </aside>

    <!-- CENTER: Kick stream -->
    <main id="stream-panel">
      <div id="stream-container">
        <!-- Loading state shown until backend sends the channel -->
        <div id="stream-loading">
          <div class="loading-logo">Market<br>Bubble</div>
          <p class="loading-text" id="loading-text">Connecting to stream…</p>
        </div>
        <iframe
          id="kick-player"
          src=""
          frameborder="0"
          scrolling="no"
          allowfullscreen="true"
          allow="autoplay; fullscreen"
        ></iframe>
      </div>

      <div id="stream-controls">
        <div class="controls-left">
          <div class="live-dot-wrap">
            <span class="live-dot-red"></span>
            <span class="live-label">LIVE</span>
          </div>
          <span class="stream-channel-chip" id="stream-channel-chip">—</span>
        </div>
        <div class="controls-mid">
          <span id="viewer-count" title="">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
            <span id="viewer-num">—</span>
          </span>
          <span id="stream-timer">00:00:00</span>
        </div>
        <div class="controls-right">
          <button class="ctrl-btn" id="fullscreen-btn" title="Fullscreen">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
          </button>
        </div>
      </div>

      <div id="stream-meta">
        <div class="stream-avatar">MB</div>
        <div class="stream-meta-info">
          <div class="stream-channel-name">Market Bubble
            <svg width="13" height="13" viewBox="0 0 24 24" fill="#5b9bd5"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
          </div>
          <div class="stream-meta-title">NEVER FADE ANSEM | Banks & Ansem Live</div>
        </div>
        <div class="stream-tags">
          <span class="tag">Finance</span>
          <span class="tag">Crypto</span>
          <span class="tag">Markets</span>
        </div>
        <div class="stream-meta-right">
          <button class="subscribe-btn">Subscribe ▾</button>
        </div>
      </div>
    </main>

    <!-- RIGHT: Chat -->
    <aside id="chat-panel">
      <div class="panel-header">
        <div class="panel-title">Live Chat</div>
        <div id="ws-status" class="ws-dot disconnected"></div>
      </div>

      <!--
        TWO-TAB SELECTOR: only Twitch and Kick channels from .env
        Tabs are built dynamically in app.js once channels are known
      -->
      <div id="chat-tabs">
        <button class="chat-tab active" data-platform="all">All</button>
        <button class="chat-tab twitch-tab" data-platform="twitch">Twitch</button>
        <button class="chat-tab kick-tab" data-platform="kick">Kick</button>
        <button class="chat-tab x-tab" data-platform="x">X</button>
      </div>

      <div id="chat-feed-wrap">
        <ul id="chat-feed"></ul>
      </div>

      <!-- Auth -->
      <div id="auth-bar">
        <div id="login-prompt">
          <button id="twitch-login-btn" class="twitch-login-btn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/></svg>
            Sign in with Twitch to chat
          </button>
        </div>
        <div id="logged-in-bar" class="hidden">
          <div id="user-info">
            <img id="user-avatar" src="" alt=""/>
            <span id="user-name"></span>
          </div>
          <button id="logout-btn" class="logout-btn" title="Sign out">✕</button>
        </div>
      </div>

      <!-- Input -->
      <div id="chat-input-row">
        <!--
          Channel selector — only shows Twitch channels from .env
          (2 options max: the channels you configured)
        -->
        <select id="chat-channel-select" disabled></select>
        <input type="text" id="chat-input" placeholder="Sign in to chat…" disabled maxlength="500"/>
        <button class="send-btn" id="send-btn" disabled>Chat</button>
      </div>
    </aside>

  </div>

  <div id="error-toast"></div>
  <script src="/static/app.js"></script>
</body>
</html>
