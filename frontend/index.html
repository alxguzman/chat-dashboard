<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Market Bubble — Live Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

  <!-- ── Site Header ───────────────────────────────────────────── -->
  <header id="site-header">
    <a class="header-logo" href="/" aria-label="Market Bubble">
      <img class="logo-img" src="/static/market_bubble_logo.png" height="14", width="14", alt="Market Bubble" draggable="false"/>
    </a>

    <button id="theme-toggle" title="Toggle light / dark mode" aria-label="Toggle theme">
      <!-- Moon: shown in dark mode -->
      <svg class="icon-moon" viewBox="0 0 24 24" fill="currentColor" width="17" height="17">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <!-- Sun: shown in light mode -->
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="17" height="17">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
      </svg>
    </button>
  </header>

  <div id="ticker-bar">
    <div class="ticker-track" id="ticker-track"></div>
  </div>

  <div id="app">

    <!-- LEFT: Multi-tab Panel (X Posts / Polymarket / Price Chart) -->
    <aside id="tweets-panel">
      <div class="panel-header">
        <div class="panel-title" id="left-panel-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.858L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          <span id="left-panel-title-text">Live Posts</span>
        </div>
        <div class="ws-dot connected" id="left-status-dot"></div>
      </div>

      <!-- Tabs -->
      <div id="left-tabs">
        <button class="left-tab active" data-left-tab="x">X Posts</button>
        <button class="left-tab" data-left-tab="polymarket">Polymarket</button>
        <button class="left-tab" data-left-tab="chart">Price Chart</button>
      </div>

      <!-- Pane: X Posts -->
      <div id="left-pane-x" class="left-pane">
        <div id="tweets-feed"></div>
        <a class="view-more-btn" href="https://x.com" target="_blank">View on X ↗</a>
      </div>

      <!-- Pane: Polymarket -->
      <div id="left-pane-polymarket" class="left-pane left-pane-hidden">
        <div class="left-search-row">
          <input type="text" id="poly-search" placeholder="Search prediction markets…" autocomplete="off"/>
          <button id="poly-search-btn">Search</button>
        </div>
        <div id="poly-results" class="left-scroll-area"></div>
      </div>

      <!-- Pane: Price Chart -->
      <div id="left-pane-chart" class="left-pane left-pane-hidden">
        <div class="left-search-row">
          <input type="text" id="chart-search" placeholder="BTC, ETH, AAPL, TSLA…" autocomplete="off"/>
          <button id="chart-search-btn">Chart</button>
        </div>
        <div id="chart-container">
          <div class="chart-placeholder">Enter a symbol above to load chart</div>
        </div>
      </div>
    </aside>

    <!-- LEFT DIVIDER — drag to resize left panel vs stream -->
    <div id="left-divider" title="Drag to resize · Double-click to reset">
      <div class="divider-handle"></div>
      <div id="left-snap-buttons">
        <button id="left-snap-hide"    title="Collapse left panel">◀</button>
        <button id="left-snap-default" title="Restore default" class="active">⬛</button>
        <button id="left-snap-expand"  title="Expand left panel">▶</button>
      </div>
    </div>

    <!-- CENTER: Twitch stream -->
    <main id="stream-panel">
      <div id="stream-container">
        <div id="stream-loading">
          <div class="loading-logo">Market<br>Bubble</div>
          <p class="loading-text" id="loading-text">Connecting to stream…</p>
        </div>
        <!-- Twitch embed (replaces Kick) -->
        <iframe
          id="twitch-player"
          src=""
          frameborder="0"
          scrolling="no"
          allowfullscreen="true"
          allow="autoplay; fullscreen"
        ></iframe>
      </div>

      <div id="stream-meta">
        <div class="live-dot-wrap">
          <!-- <span class="live-dot-red"></span>
          <span class="live-label"></span> -->
        </div>
        <span class="stream-channel-chip" id="stream-channel-chip">—</span>
        <div class="stream-avatar">MB</div>
        <div class="stream-meta-info">
          <div class="stream-channel-name">Market Bubble
            <svg width="13" height="13" viewBox="0 0 24 24" fill="#5b9bd5"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
          </div>
          <div class="stream-meta-title"></div>
        </div>
        <!-- <div class="stream-tags">
          <span class="tag">Finance</span>
          <span class="tag">Crypto</span>
          <span class="tag">Markets</span>
        </div> -->
        <div class="stream-meta-right">
          <!-- Fear & Greed gauge — powered by live chat sentiment -->
          <div id="fear-greed-gauge">
            <svg id="fg-svg" viewBox="0 0 160 112" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="fg-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%"   stop-color="#e53e3e"/>
                  <stop offset="28%"  stop-color="#ed8936"/>
                  <stop offset="50%"  stop-color="#ecc94b"/>
                  <stop offset="72%"  stop-color="#9ae6b4"/>
                  <stop offset="100%" stop-color="#38a169"/>
                </linearGradient>
              </defs>
              <!-- Dark track -->
              <path d="M 24 80 A 56 56 0 0 1 136 80" fill="none" stroke="#1a202c" stroke-width="13" stroke-linecap="round"/>
              <!-- Gradient arc -->
              <path d="M 24 80 A 56 56 0 0 1 136 80" fill="none" stroke="url(#fg-grad)" stroke-width="13" stroke-linecap="round"/>
              <!-- Needle (rotates around 80,80) -->
              <g id="fg-needle-group">
                <line x1="80" y1="80" x2="80" y2="30" stroke="#e2e8f0" stroke-width="2.5" stroke-linecap="round"/>
              </g>
              <!-- Center knob -->
              <circle cx="80" cy="80" r="5.5" fill="#4a5568"/>
              <circle cx="80" cy="80" r="2.5"  fill="#1a202c"/>
              <!-- Chat word count -->
              <text id="fg-count" x="80" y="70" text-anchor="middle"
                    fill="#e2e8f0" font-family="JetBrains Mono,monospace"
                    font-size="11" font-weight="600">0</text>
              <!-- Labels -->
              <text x="20"  y="108" text-anchor="middle" fill="#fc8181"
                    font-family="Barlow Condensed,sans-serif"
                    font-size="12" font-weight="700" letter-spacing="0.08em">FEAR</text>
              <text x="140" y="108" text-anchor="middle" fill="#68d391"
                    font-family="Barlow Condensed,sans-serif"
                    font-size="12" font-weight="700" letter-spacing="0.08em">GREED</text>
            </svg>
          </div>
        </div>
      </div>
    </main>

    <!-- DIVIDER — drag to resize stream vs chat -->
    <div id="panel-divider" title="Drag to resize · Double-click to reset">
      <div class="divider-handle"></div>
      <div id="snap-buttons">
        <button id="snap-stream" title="Expand chat (~420px)">◀</button>
        <button id="snap-equal"  title="Restore default" class="active">⬛</button>
        <button id="snap-chat"   title="Collapse chat">▶</button>
      </div>
    </div>

    <!-- RIGHT: Chat -->
    <aside id="chat-panel">
      <div class="panel-header">
        <div class="panel-header-left">
          <div class="panel-title">Live Chat</div>
          <div id="streamer-btns">
            <button class="streamer-btn active" data-streamer="all" title="All chats combined">
              <img src="/static/mblogo.jpg" alt="All">
            </button>
            <button class="streamer-btn" data-streamer="banks" title="FazeBanks">
              <img src="/static/banks.png" alt="FazeBanks">
            </button>
            <button class="streamer-btn" data-streamer="ansem" title="Ansem">
              <img src="/static/ansem.webp" alt="Ansem">
            </button>
          </div>
        </div>
        <div class="panel-header-right">
          <span id="viewer-count" title="">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
            <span id="viewer-num">—</span>
          </span>
          <div id="ws-status" class="ws-dot disconnected"></div>
        </div>
      </div>

      <div id="chat-tabs">
        <button class="chat-tab active" data-platform="all">All</button>
        <button class="chat-tab twitch-tab" data-platform="twitch">Twitch</button>
        <button class="chat-tab kick-tab" data-platform="kick">Kick</button>
        <button class="chat-tab x-tab" data-platform="x">X</button>
      </div>

      <!-- Ticker filter status bar — hidden until a ticker is clicked -->
      <div id="ticker-filter-bar" class="hidden">
        Showing: <span id="ticker-filter-label"></span>
        <button id="ticker-filter-clear">✕ clear</button>
      </div>

      <!-- Sentiment filter bar — shown when Fear/Greed gauge is clicked -->
      <div id="fg-filter-bar" class="hidden">
        Showing sentiment messages only
        <button id="fg-filter-clear">✕ clear</button>
      </div>

      <div id="chat-feed-wrap">
        <ul id="chat-feed"></ul>
      </div>

      <!-- Auth -->
      <div id="auth-bar">
        <div id="login-prompt">
          <button id="twitch-login-btn" class="twitch-login-btn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/></svg>
            Sign in with Twitch to chat
          </button>
        </div>
        <div id="logged-in-bar" class="hidden">
          <div id="user-info">
            <img id="user-avatar" src="" alt=""/>
            <span id="user-name"></span>
          </div>
          <button id="logout-btn" class="logout-btn" title="Sign out">✕</button>
        </div>
      </div>

      <!-- Input -->
      <div id="chat-input-row">
        <select id="chat-channel-select" disabled></select>
        <input type="text" id="chat-input" placeholder="Sign in to chat…" disabled maxlength="500"/>
        <button class="send-btn" id="send-btn" disabled>Chat</button>
      </div>
    </aside>

  </div>

  <div id="error-toast"></div>
  <script src="/static/app.js"></script>
</body>
</html>
